name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: dailydev-jar
          path: target/dailydev-1.0.0.jar
          retention-days: 1

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: dailydev-jar

      - name: Deploy
        run: |
          cp dailydev-1.0.0.jar /opt/dailydev/dailydev-1.0.0.jar
          sudo systemctl restart dailydev
          sudo systemctl status dailydev --no-pager
