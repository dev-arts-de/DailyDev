name: Build & Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Deploy to Raspberry Pi
        env:
          PI_HOST: ${{ secrets.PI_HOST }}
          PI_USER: ${{ secrets.PI_USER }}
          PI_SSH_KEY: ${{ secrets.PI_SSH_KEY }}
        run: |
          echo "$PI_SSH_KEY" > /tmp/pi_key
          chmod 600 /tmp/pi_key

          scp -i /tmp/pi_key \
              -o StrictHostKeyChecking=no \
              target/dailydev-1.0.0.jar \
              $PI_USER@$PI_HOST:/opt/dailydev/dailydev-1.0.0.jar

          ssh -i /tmp/pi_key \
              -o StrictHostKeyChecking=no \
              $PI_USER@$PI_HOST \
              "sudo systemctl restart dailydev && sudo systemctl status dailydev --no-pager"
